<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#0a3347; color:#fff; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:20px; }
  .redirect-card { max-width:360px; }
  .spinner { width:40px; height:40px; border:3px solid rgba(255,255,255,0.2); border-top-color:#c4a35a; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 20px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  h2 { font-size:18px; font-weight:600; margin-bottom:8px; }
  p { font-size:14px; opacity:0.7; line-height:1.5; }
  a { color:#c4a35a; text-decoration:underline; font-size:13px; display:inline-block; margin-top:16px; }
</style>
</head>
<body>
<div class="redirect-card">
  <div class="spinner"></div>
  <h2>Taking you to La-Z-Boy Incorporated Careers</h2>
  <p>You'll be redirected in just a moment.</p>
  <a href="https://careers.la-z-boy.com/">Click here if you're not redirected</a>
</div>
<script>
var GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz8fGJBKbDpskV3tDATF-JxHow5gXMMHoTSV4-tjvgVPDupo8GjpqptXW74Kz2JapTC/exec';
var DESTINATION = 'https://careers.la-z-boy.com/';

var params = new URLSearchParams(window.location.search);
var source   = params.get('s') || 'unknown';
var campaign = params.get('c') || 'general';
var advocate = params.get('a') || 'anonymous';

// Unique click tracking: create a fingerprint for this specific link
var linkFingerprint = 'puac_' + source + '_' + campaign + '_' + advocate;

// Check if this browser has already clicked this exact link
function hasAlreadyClicked() {
  try {
    return document.cookie.indexOf(linkFingerprint + '=1') !== -1;
  } catch(e) {
    return false;
  }
}

// Mark this link as clicked (cookie expires in 30 days)
function markAsClicked() {
  try {
    var d = new Date();
    d.setTime(d.getTime() + (30 * 24 * 60 * 60 * 1000));
    document.cookie = linkFingerprint + '=1;expires=' + d.toUTCString() + ';path=/';
  } catch(e) {}
}

function redirect() {
  window.location.href = DESTINATION;
}

// Only track if this is a unique click
if (!hasAlreadyClicked()) {
  markAsClicked();

  var trackingUrl = GOOGLE_SCRIPT_URL
    + '?action=click'
    + '&source=' + encodeURIComponent(source)
    + '&campaign=' + encodeURIComponent(campaign)
    + '&advocate=' + encodeURIComponent(advocate)
    + '&referrer=' + encodeURIComponent(document.referrer || 'direct');

  var img = new Image();
  img.onload = function() { redirect(); };
  img.onerror = function() { redirect(); };
  img.src = trackingUrl;

  // Safety net
  setTimeout(redirect, 3000);
} else {
  // Already clicked — just redirect without tracking
  redirect();
}
</script>
</body>
</html>
